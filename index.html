<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FlyingGrow</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
text-align:center;
color:white;
box-shadow:0 10px 35px rgba(0,0,0,.4);
}

.logo{
font-size:60px;
margin-bottom:10px;
}

h1{
margin-bottom:8px;
}

.dev{
color:#ddd;
margin-bottom:20px;
}

.btn{
width:100%;
padding:16px;
margin:8px 0;
border:none;
border-radius:15px;
background:#229ED9;
color:#fff;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.btn2{
background:#16a34a;
}

.btn3{
background:#f59e0b;
}

.footer{
margin-top:18px;
color:#ddd;
font-size:13px;
}

.task{
display:block;
margin-top:12px;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">🚀</div>

<h1>FlyingGrow</h1>

<div class="dev">
Developer : Amir Hamza
</div>

<button class="btn" onclick="showRewarded()">
📺 Watch Rewarded Ad
</button>

<button class="btn btn2" onclick="showInterstitial()">
🎬 Interstitial Ad
</button>

<adsgram-task
data-block-id="task-36734"
data-debug="true"
data-debug-console="true"
class="task">
</adsgram-task>

<button class="btn btn3" onclick="comingSoon()">
💰 Withdraw
</button>

<button class="btn" onclick="comingSoon()">
📊 History
</button>

<div class="footer">
FlyingGrow Mini App v1.0
</div>
<script>

// Telegram WebApp
if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
}

// Rewarded Ad
const rewardedAd = window.Adsgram.init({
    blockId: "36732",
    debug: true,
    debugConsole: true
});

// Interstitial Ad
const interstitialAd = window.Adsgram.init({
    blockId: "int-36733",
    debug: true,
    debugConsole: true
});

// Rewarded
async function showRewarded() {
    try {
        await rewardedAd.show();
        alert("✅ Reward received!");
    } catch (e) {
        alert("Rewarded Ad unavailable.");
        console.log(e);
    }
}

// Interstitial
async function showInterstitial() {
    try {
        await interstitialAd.show();
    } catch (e) {
        alert("Interstitial Ad unavailable.");
        console.log(e);
    }
}

// Coming Soon
function comingSoon() {
    alert("Coming Soon");
}

// Task Ad events
const task = document.querySelector("adsgram-task");

if (task) {

    task.addEventListener("reward", () => {
        alert("🎉 Task reward received!");
    });

    task.addEventListener("onError", (e) => {
        console.log("Task Error:", e);
    });

    task.addEventListener("onBannerNotFound", () => {
        alert("No Task available now.");
    });

    task.addEventListener("onTooLongSession", () => {
        alert("Restart Telegram and try again.");
    });

}

</script>

</body>
</html>
